<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Configuración básica del documento -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Título que aparece en la pestaña del navegador -->
  <title>Collage Reggaetón</title>

  <link rel="stylesheet" href="estilo.css" />

  <script defer src="script.js"></script>

  <!-- Fuente Anton desde Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Encabezado principal -->
  <header class="hero">
    <!-- Título principal de la página -->
    <h1 id="titulo" class="titulo">ENTRA A CADA MUNDO</h1>
  </header>

  <!-- Contenedor principal de los artistas -->
  <main class="artistas">

    <!-- Cada artista es un link a su propia página -->
    <a href="feid.html" class="artista" aria-label="Ir al mundo de Feid">
      <img src="assets/feid.jpg" alt="Feid">
    </a>

    <a href="badbunny.html" class="artista" aria-label="Ir al mundo de Bad Bunny">
      <img src="assets/badbunny.jpg" alt="Bad Bunny">
    </a>

    <a href="alvarito.html" class="artista" aria-label="Ir al mundo de Alvarito Diaz">
      <img src="assets/alvarito.jpg" alt="Alvarito Diaz">
    </a>

    <a href="karolg.html" class="artista" aria-label="Ir al mundo de Karol G">
      <img src="assets/karolg.jpg" alt="Karol G">
    </a>

  </main>

</html>
